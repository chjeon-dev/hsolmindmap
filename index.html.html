const md = `# 한솔제지 협력사 안전서류 업무분석 (AS-IS)

## 1. 개요
### 목적
- 32종 서류 수기 프로세스 표준화
- 자동화 검토 기초자료로 활용
### 적용범위
- 대전·천안·장항 등 전 사업장
- 협력사 서면제출 32종 전체
- 접수~보관 전체 프로세스
### 현행 특징
- 전자결재 미도입, 서면수령
- 형식·내용·법률 미분리(1인 순차수행)
- 대면결재(서명·날인)
- 캐비닛 물리보관
### 용어정의
- 형식확인
- 내용검토
- 법률검토
- 보완요청
- 결재
- PL(현업PL / 안전보건PL)

## 2. 전체 프로세스(5단계)
- STEP1 문서접수 - 60분(15.5%)
- STEP2 안전관리계획서 검토 - 248분(63.9%, 최대병목)
- STEP3 1차승인(현업PL) - 20분(5.2%)
- STEP4 2차승인(안전보건PL) - 20분(5.2%)
- STEP5 보관 - 40분(10.3%)
- 총 388분(약 6.5시간, 예외 제외 기본치)

## 3. 단계별 상세
### 3.1 문서접수
#### 세부업무
- 우편·방문·팩스 수령

- 1건이라도 미접수시 2단계 진행불가
#### 산출물
- 접수대장, 서류원본 일체

### 3.2 안전관리계획서 검토(19개 문서그룹)
#### ① 안전관리계획서(갑지)-서식1
- [형식] 공사기간·서명날인 여부
- [내용] 특기사항 이행 교차확인
- [법률] 도급인 안전조치의무
#### ② 수급업체 공사허가신청-서식1-1
- [형식] 기재사항·승인서명 여부
- [내용] 위험작업별 대책
- [법률] 산재보험 가입의무
#### ③ 고용·산재보험 가입증명원
- [형식] 사업기간 포함여부
- [내용] 발주처 상이시 예외사유
- [법률] 의무가입·미가입 리스크
#### ④ 공사일정 및 인원투입현황-서식3
- [형식] 기재여부
- [내용] 안전대책 대응·인원일치
#### ⑤ 현장대리인 선임계 등-서식4~5
- [형식] 19개항목 서명
- [내용] 미성년자·외국인 요건
- [법률] 근로기준법·출입국관리법
#### ⑥ 안전관리조직체계-서식6~7
- [형식] 직책별 연락처
- [내용] 인원일치·필수인력 배치
- [법률] 안전관리자 선임의무
#### ⑦ 최초 안전회의록-서식8
- [형식] 참석자 서명
- [내용] JSA-작업계획 일치
- [법률] 위험성평가 실시의무
#### ⑧ 안전교육 참석대장 등-서식9~11
- [형식] 개별접수·유효성
- [내용] 교육과정 적합성
- [법률] 기초안전보건교육 이수의무
- 근로자 6명 기준 30분(반복형)
#### ⑨ 위험작업 위험성평가(JSA)-서식12
- [형식] 상호검증 서명
- [내용] 위험도점수 타당성·개선방향
- [법률] 중대재해처벌법 연계
- 최고 전문성 요구, 25분
#### ⑩ 설비 내 위험요인별 안전교육-서식13
- [형식] 교육일시·서명
- [내용] 위험요인 대응
- [법률] 특별안전보건교육 대상
#### ⑪ 반입수공구 및 장비LIST-서식14
- [형식] 안전장치 상태
- [내용] 장비-계획서 일치
- [법률] 안전인증(KCs)
#### ⑫ 안전보건관리비 사용내역서-서식15·21
- [형식] 금액 일치
- [내용] 항목 적정성
- [법률] 사용기준 고시
#### ⑬ 안전정보 제공대장-서식16
- [형식] 쌍방 서명
- [법률] 안전보건정보 제공의무
#### ⑭ 임시사무실허가 등-서식17~20
- [형식] 기재란 완비
#### ⑮ 작업계획서 및 세부내용-서식22~23
- [형식] 서명란 누락 확인
- [내용] 운행경로·중량물 규격
- [법률] 안전보건규칙 제38조
- 도면·동선 대조, 25분
#### ⑯ 인양구간 등-서식24~27
- [형식] 교육이수증·보험
- [법률] 특수형태근로종사자 안전조치
#### ⑰ 중대재해 예방시트 등-서식28~30
- [내용] 위험작업 포함여부
- [법률] 중대재해처벌법 안전보건확보의무
#### ⑱ TBM 체크리스트-서식31~32
- [형식] 일자별 서명
- [내용] TBM-실작업 일치
#### ⑲ 특수건강진단 결과표(참고)
- [내용] 작업제한자 배치여부
- [법률] 특수건강진단 실시의무
#### 보완요청 및 재검토
- 미비시 서면 보완요청서 작성
- 재제출본은 형식확인부터 재검토(루프)
#### 처리기준
- 형식·내용·법률 중 하나라도 미통과시 승인단계 불가
- 법률위반 소지시 안전보건PL·법무팀 사전공유

### 3.3 1차승인(현업PL)
#### 세부업무
- 서류전달
- 검토·서명날인
- 반려시 구두·메모 전달
- 재제출본 2단계부터 재검토
#### 처리기준
- PL 부재시 대리결재자
- 1차없이 2차 진행불가
#### 산출물
- 1차승인 서명원본

### 3.4 2차승인(안전보건PL)
#### 세부업무
- 1차완료서류 전달
- 안전성 최종확인·서명날인
- 반려시 안전담당자 전달
#### 처리기준
- PL 부재시 대리결재자
- 2차완료되어야 착수허용
#### 산출물
- 2차승인 서명원본(32종 전체 승인완료)

### 3.5 보관
#### 세부업무
- 서명날인 완료여부 육안대조
- 미완료시 회송
- 보관대장 수기기록
- 공사별·협력사별 편철
- 개인건강정보 별도잠금
- 열람대출시 대출대장기록
#### 처리기준
- 법정 보존기간 보관
- 개인건강정보 열람권한자 사전지정
#### 산출물
- 보관대장, 편철원본

## 4. 역할과 책임(R&R)
- 현업 안전담당자: 접수(R/A)·검토(R/A)·1차승인(S)·2차승인(S)·보관(R/A)
- 현업PL: 검토(C)·1차승인(A/R)
- 안전보건PL: 검토(C)·2차승인(A/R)
- 협력사: 접수(R)·검토(I)·1차승인(I)·2차승인(I)
- 특징: 전단계 사람 수행, 자동처리 없음

## 5.부록 32종 체크리스트 분류
- 형식중심: 1-1·2·4·5·8·9·10·11·14·16·17~20
- 형식+내용: 3·6·7·15·21·24~27·31~32
- 내용중심: 1·12·13·22~23·28~30

## 6. 소요시간 분석
- STEP1 60분(15.5%)
- STEP2 248분(63.9%, 최대병목)
  - JSA 25분(최고 전문성)
  - 작업계획서 25분(도면대조)
  - 안전교육참석대장 30분(6명×5분, 반복형)
- STEP3 20분(5.2%)
- STEP4 20분(5.2%)
- STEP5 40분(10.3%)
- 총 388분(예외 제외 기본치)
`;

let mm, root;

window.addEventListener('load', () => {
  const { Transformer } = markmap;
  const transformer = new Transformer();
  const { root: r } = transformer.transform(md);
  root = r;

  const { Markmap } = window.markmap;
  mm = Markmap.create('#mindmap', {
    autoFit: true,
    duration: 300,
    maxWidth: 340,
    spacingVertical: 6,
    spacingHorizontal: 90,
    initialExpandLevel: -1
  }, root);

  setTimeout(() => mm.fit(), 400);
});

window.addEventListener('resize', () => { if (mm) mm.fit(); });
</script>
